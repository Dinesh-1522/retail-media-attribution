version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: retail_media_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: retail_user
      POSTGRES_PASSWORD: retail_pass
      POSTGRES_DB: retail_media
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lidocker stop 97d90dbcca5b 0df0fdab3889b/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail_user -d retail_media"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: